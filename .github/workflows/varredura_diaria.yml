name: Varredura Diária de Imóveis Salvador

on:
  schedule:
    # Executa diariamente às 10:00 UTC (07:00 Horário de Brasília)
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  executar-varredura:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Executar Script de Busca
        env:
          SCRAPER_API_KEY_IMOVEIS: ${{ secrets.SCRAPER_API_KEY_IMOVEIS }}
          SERPER_API_KEY_IMOVEIS: ${{ secrets.SERPER_API_KEY_IMOVEIS }}
        run: python main.py

      - name: Autenticar e Fazer Commit das Alterações
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "feat(bot): atualiza lista diaria de imoveis salvador [skip ci]" && git push)
